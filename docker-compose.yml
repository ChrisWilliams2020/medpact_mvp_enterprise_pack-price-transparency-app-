version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: medpact-postgres
    environment:
      POSTGRES_USER: medpact
      POSTGRES_PASSWORD: medpact
      POSTGRES_DB: medpact
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medpact"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: medpact-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: medpact-api
    environment:
      DATABASE_URL: postgresql+pg8000://medpact:medpact@postgres:5432/medpact
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    container_name: medpact-web
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: medpact-worker
    command: python -m rq.cli worker --url redis://redis:6379
    environment:
      DATABASE_URL: postgresql+pg8000://medpact:medpact@postgres:5432/medpact
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
