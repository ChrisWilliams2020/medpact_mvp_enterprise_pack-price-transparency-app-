name: CI

on:
  push:
    branches: [ main, master, release/** ]
  pull_request:
    branches: [ main, master ]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: medpact
          POSTGRES_PASSWORD: medpact
          POSTGRES_DB: medpact
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U medpact" --health-interval=5s --health-timeout=5s --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
      minio:
        image: minio/minio:RELEASE.2023-08-08T23-15-58Z
        env:
          MINIO_ROOT_USER: minio
          MINIO_ROOT_PASSWORD: minio123
        ports:
          - 9000:9000
        options: >-
          server /data --console-address ":9001"

    env:
      DATABASE_URL: postgresql+pg8000://medpact:medpact@localhost:5432/medpact
      REDIS_URL: redis://localhost:6379
      MINIO_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
      MINIO_SECURE: 'false'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('apps/api/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
          pip install requests

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 60); do
            python -c "import pg8000; conn=pg8000.connect(host='localhost',port=5432,user='medpact',password='medpact',database='medpact'); conn.close()" >/dev/null 2>&1 && echo postgres-ready && break || sleep 1
          done

      - name: Wait for MinIO
        run: |
          for i in $(seq 1 60); do
            if curl -sSf --connect-timeout 2 http://localhost:9000/minio/health/ready >/dev/null 2>&1; then
              echo minio-ready
              break
            fi
            sleep 1
          done

      - name: Ensure MinIO uploads bucket
        run: |
          python -c "from apps.api.app.storage import get_minio_client, ensure_bucket; c=get_minio_client(); ensure_bucket(c,'uploads'); print('uploads bucket ensured')"

      - name: Run pytest (if present)
        run: |
          if [ -f pytest.ini ] || [ -d tests ] || ls apps/api/tests >/dev/null 2>&1; then
            pytest -q
          else
            echo "No tests found; skipping"
          fi

  web-build:
    runs-on: ubuntu-latest
    needs: python-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build web (if package.json present)
        run: |
          if [ -f apps/web/package.json ]; then
            cd apps/web
            npm ci
            npm run build
          else
            echo "No web app found; skipping"
          fi
