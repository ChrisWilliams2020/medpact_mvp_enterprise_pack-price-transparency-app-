<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>KCN Practice Intelligence</title>
    <script>
      // Single Page App redirect for GitHub Pages
      const path = window.location.pathname;
      const repo = '/medpact-practice-intelligence';
      if (path.startsWith(repo)) {
        const route = path.slice(repo.length) || '/';
        sessionStorage.setItem('redirect', route);
      }
      window.location.replace(window.location.origin + '/medpact-practice-intelligence/');
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
