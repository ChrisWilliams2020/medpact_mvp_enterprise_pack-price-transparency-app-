<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9"/>
      <stop offset="100%" style="stop-color:#22D3EE"/>
    </linearGradient>
  </defs>
  
  <!-- MedPACT Text -->
  <text x="10" y="50" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#1E3A5F">
    <tspan fill="#1E3A5F">Med</tspan><tspan fill="#1E3A5F">PACT</tspan>
  </text>
  
  <!-- Icon - Medical Cross with Circuit -->
  <g transform="translate(220, 10)">
    <!-- Cross shape -->
    <path d="M30 0 L50 0 L50 20 L70 20 L70 40 L50 40 L50 60 L30 60 L30 40 L10 40 L10 20 L30 20 Z" 
          fill="none" stroke="url(#iconGradient)" stroke-width="3"/>
    <!-- Circuit dots -->
    <circle cx="55" cy="5" r="4" fill="#22D3EE"/>
    <circle cx="65" cy="15" r="3" fill="#22D3EE"/>
    <circle cx="70" cy="30" r="4" fill="#0EA5E9"/>
    <!-- Circuit lines -->
    <path d="M55 5 L55 -5 M65 15 L75 15 M70 30 L80 30" 
          stroke="#22D3EE" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Tagline -->
  <text x="10" y="78" font-family="Arial, sans-serif" font-size="14" fill="#1E3A5F">
    Data Intelligence, Payer Transparency
  </text>
  <text x="10" y="94" font-family="Arial, sans-serif" font-size="14" fill="#1E3A5F">
    and Profitability
  </text>
</svg>
