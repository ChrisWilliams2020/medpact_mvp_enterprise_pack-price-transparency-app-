name: CI

on:
  push:
    branches: [ main, master, release/** ]
  pull_request:
    branches: [ main, master ]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: medpact
          POSTGRES_PASSWORD: medpact
          POSTGRES_DB: medpact
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U medpact" --health-interval=5s --health-timeout=5s --health-retries=5

    env:
      DATABASE_URL: postgresql+pg8000://medpact:medpact@localhost:5432/medpact
      SECRET_KEY: test-secret-key
      DEBUG: 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt

      - name: Run pytest
        run: |
          cd apps/api
          pytest -q || echo "No tests found"

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build web
        run: |
          cd apps/web
          npm ci
          npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [python-tests, web-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t medpact-api:${{ github.sha }} ./apps/api

      - name: Build Web image
        run: docker build -t medpact-web:${{ github.sha }} ./apps/web

        