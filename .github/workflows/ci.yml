name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Start server (background)
        run: npx http-server public -p 3001 &
      - name: Run mapping test
        env:
          BASE_URL: http://127.0.0.1:3001
        run: node scripts/test_mapping.js
      - name: Run e2e smoke
        env:
          BASE_URL: http://127.0.0.1:3001
          ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
        run: node scripts/e2e_test.js
